server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text assets on the fly.
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;

    # Vite emits content-hashed filenames under /assets — safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: BrowserRouter routes (/features, /docs, ...) must resolve to
    # index.html so deep-link reloads don't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML entry so new deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
